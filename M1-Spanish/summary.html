<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resumen de tus reflexiones del entrenamiento de coach-mentor</title>
 <style>
    /* Load PolySans — replace URLs with your file locations */
    @font-face {
      font-family: "PolySans";
      src: url("PolySans-Neutral.woff2") format("woff2"),
           url("PolySans-Neutral.woff") format("woff");
      font-weight: normal;
    }

    body {
      font-family: "PolySans", sans-serif;
      padding: 30px;
      max-width: 700px;
      margin: auto;
      font-size: 18px;
      line-height: 1.6;
      background-color: #F3EBDD;
    }

    textarea {
      width: 100%;
      height: 180px;
      font-family: "PolySans", sans-serif;
      font-size: 16px;
      padding: 12px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 16px;
      font-family: "PolySans", sans-serif;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background-color: #1F3F59;
      color: white;
    }

    .saved-note {
      margin-top: 10px;
      color: #008000;
      font-size: 14px;
    }
 
</style>
</head>
<body>
<h2>Tus reflexiones del entrenamiento de coach-mentor</h2>
<div class="summary" id="summaryDisplay"></div>
  <button onclick="downloadPDF()" 
        style="margin: 20px 0; padding: 12px 18px; font-size: 16px;">
  Descarga tus reflexiones en PDF
</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <script src="PolySans-normal.js"></script>
  <script src="PolySans-bold.js"></script>
  <script>
  if (window.jspdf && window.jspdf.jsPDF) {
    window.jspdf.jsPDF.API.events.forEach(([event, handler]) => {
      if (event === 'addFonts') handler.call(window.jspdf.jsPDF.API);
    });
  }
  </script>

<script>
// Set how many reflections you have
const totalReflections = 14;

// MANUALLY ENTER TITLES HERE (index 0 = reflection1)
const titles = [
  "Las cualidades que me hacen único/a:",
"Algunas fortalezas que existen en mi comunidad y cómo podría aprovecharlas:",
"Lo que sé sobre los desafíos que mis jugadores/as podrían estar enfrentando y cómo puedo aprender más:",
"Algunas estrategias que puedo usar para conectar con mis jugadores/as:",
"Mi plan para crear un código de equipo con mis jugadores/as:",
"Lo que puedo hacer para crear consistencia:",
"Mis técnicas para controlarme:",
"Lo que podría estar causando que mi jugador/a de 7 años corra, grite, ría... y NO preste atención:",
"Cómo puedo usar C.A.T.C.H. y la empatía para responder de manera efectiva a mi jugador/a de 7 años que no presta atención:",
"Lo que podría estar causando que mi jugador/a de 14 años se niegue a hacer las vallas de 300 metros:",
"Cómo puedo usar C.A.T.C.H. y la empatía para responder de manera efectiva a mi jugador/a de 14 años que no presta atención:",
"2 estrategias que puedo usar para cumplir con el código de equipo:",
"Cómo puedo ayudar a mis jugadores/as a hacer una transición positiva hacia el final de la temporada:",
"Cómo puedo darle un cierre al final de la temporada:",
];

function showSummary() {
  const summaryEl = document.getElementById('summaryDisplay');
  let html = '';

  for (let i = 1; i <= totalReflections; i++) {
    const title = titles[i - 1] || `Reflection ${i}`;
    const key = "reflection" + i;
    const stored = localStorage.getItem(key);

    if (!stored) continue;

    html += `
      <div style="margin-bottom: 25px;">
        <div style="font-weight: bold; font-size: 20px; margin-bottom: 8px;">
          ${title}
        </div>
        <div style="white-space: pre-wrap;">
          ${stored}
        </div>
      </div>
    `;
  }

  summaryEl.innerHTML = html || "Aún no hay reflexiones guardadas.";
}

  
async function downloadPDF() {
  const { jsPDF } = window.jspdf;

  // --- CONFIG ---
  const logoURL = "https://images.squarespace-cdn.com/content/5b1dd63f620b85685e2e9978/15782fbc-a9dc-4f5b-94f2-a6f9cf73c65a/Foundation-YC-lockup-sm.png"; 
  const pageWidth = 612;   // Letter size width in pt (8.5in * 72)
  const pageHeight = 792;  // Letter size height in pt (11in * 72)
  const leftMargin = 60;
  const rightMargin = 60;
  const usableWidth = pageWidth - leftMargin - rightMargin;
  const lineHeight = 18;

  // Load logo as data URL
  let logoData = null;
  try {
    logoData = await new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "Anonymous";
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = img.width;
        canvas.height = img.height;
        canvas.getContext("2d").drawImage(img, 0, 0);
        resolve(canvas.toDataURL("image/png"));
      };
      img.onerror = reject;
      img.src = logoURL;
    });
  } catch(e) {
    console.warn("Logo could not be loaded, continuing without it.");
  }

  // Create Letter size PDF
  const doc = new jsPDF({
    unit: "pt",
    format: "letter"
  });

  let y = 40; // start height

  // Add logo if loaded
  if (logoData) {
  const targetWidth = 180;
const scale = targetWidth / 354;

const renderWidth = 180;
const renderHeight = 105 * scale;

doc.addImage(logoData, "PNG", leftMargin, y, renderWidth, renderHeight);
y += renderHeight + 50;   // move down after logo
}
 
  // Add main header
  doc.setFont("PolySans", "bold");
  doc.setFontSize(22);

  // Wrap header text
  const header = "Resumen de tus Reflexiones";
  const headerLines = doc.splitTextToSize(header, usableWidth);
  headerLines.forEach(line => {
    if (y > pageHeight - 50) { doc.addPage(); y = 40; }
    doc.text(line, leftMargin, y);
    y += lineHeight;
  });
  y += 20;

  // --- Loop through reflections ---
  for (let i = 1; i <= totalReflections; i++) {
    const key = "reflection" + i;
    const stored = localStorage.getItem(key);
    if (!stored) continue;

    const title = titles[i - 1] || `Reflection ${i}`;

    // Add title in bold
    doc.setFont("PolySans", "bold");
    doc.setFontSize(16);
    const titleLines = doc.splitTextToSize(title, usableWidth);
    titleLines.forEach(line => {
      if (y > pageHeight - 50) { doc.addPage(); y = 40; }
      doc.text(line, leftMargin, y);
      y += lineHeight;
    });
    y += 8; // small spacing before body

    // Add body text
    doc.setFont("PolySans", "normal");
    doc.setFontSize(12);
    const wrapped = doc.splitTextToSize(stored, usableWidth);
    wrapped.forEach(line => {
      if (y > pageHeight - 50) { doc.addPage(); y = 40; }
      doc.text(line, leftMargin, y);
      y += lineHeight;
    });

    y += 20; // spacing between reflections
  }

  doc.save("Reflexiones.pdf");
}

// Make sure your summary is shown on page load
window.onload = showSummary;

</script>
</body>
</html>
